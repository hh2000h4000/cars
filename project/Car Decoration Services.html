  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  ],\n  };\n\n  go = (s) => {\n    this.setState(st => ({ history:[...st.history, st.screen], screen:s }), () => {\n      if (this.scrollRef.current) this.scrollRef.current.scrollTop = 0;\n    });\n  };\n  back = () => {\n    this.setState(st => {\n      const h = [...st.history];\n      const prev = h.pop() || 'home';\n      return { history:h, screen:prev };\n    }, () => { if (this.scrollRef.current) this.scrollRef.current.scrollTop = 0; });\n  };\n  jump = (s) => this.setState({ screen:s, history:[] }, () => { if (this.scrollRef.current) this.scrollRef.current.scrollTop = 0; });\n\n  acceptQuote = (id) => { this.setState({ acceptedQuoteId:id }); this.go('requestDetail'); };\n  acceptBest = () => { this.setState({ acceptedQuoteId:'q1' }); this.go('requestDetail'); };\n  setReview = (k,v) => this.setState(st => ({ review:{...st.review, [k]:v} }));\n  setComplaint = (k) => this.setState({ complaint:k });\n  toggleShop = (id) => this.setState(st => st.selectedShops.includes(id)\n    ? { selectedShops: st.selectedShops.filter(x=>x!==id) }\n    : { selectedShops: [...st.selectedShops, id] });\n  setShopStatus = (id, v) => this.setState(st => ({ shopStatus:{...st.shopStatus, [id]:v} }));\n  sendQuoteNow = () => { this.setState({ sentQuote:true }); this.go('shopRequests'); };\n\n  send = () => {\n    const v = this.chatRef.current && this.chatRef.current.value.trim();\n    if (!v) return;\n    const id = Date.now();\n    this.setState(st => ({ msgs:[...st.msgs, { id, me:true, text:v, t:'الآن' }] }));\n    this.chatRef.current.value = '';\n    setTimeout(() => this.setState(st => ({ msgs:[...st.msgs, { id:id+1, me:false, text:'تمام، تم تسجيل ملاحظتك. سنحدّث عرض السعر فوراً.', t:'الآن' }] })), 1100);\n  };\n  sendImage = () => {\n    const id = Date.now();\n    this.setState(st => ({ msgs:[...st.msgs, { id, me:true, img:true, text:'صورة مرفقة', t:'الآن' }] }));\n  };\n\n  renderVals(){\n    const scr = this.state.screen;\n    const screens = ['onboarding','custReg','shopReg','shopPending','home','shop','vehicles','addVehicle','newRequest','shopSelect','requests','requestDetail','quote','chat','review','complaint','complaintDone','profile','shopDash','shopRequests','shopRequestDetail','sendQuote','adminDash','adminPending','adminDisputes'];\n    const show = {};\n    screens.forEach(k => show['is_'+k] = scr===k);\n\n    const cTabs = ['home','requests','vehicles','chats','profile'];\n    const is_tab_customer = ['home','requests','vehicles','profile'].includes(scr);\n    const is_tab_shop = ['shopDash','shopRequests'].includes(scr);\n    const is_tab_admin = ['adminDash','adminPending','adminDisputes'].includes(scr);\n    const is_chat = scr==='chat';\n\n    const A='#A07E2E', G='#9A958A';\n    const tc = n => ({ ['tc_'+n]: scr===n ? A : G });\n    const tabColors = Object.assign({}, tc('home'), tc('requests'), tc('vehicles'), tc('chats'), tc('profile'), tc('shopDash'), tc('shopRequests'));\n    const ta = n => ({ ['ta_'+n]: scr===('admin'+n.charAt(0).toUpperCase()+n.slice(1)) ? '#E4CC7E' : '#7C786E' });\n    const adminColors = { ta_dash: scr==='adminDash'?'#E4CC7E':'#7C786E', ta_pending: scr==='adminPending'?'#E4CC7E':'#7C786E', ta_disputes: scr==='adminDisputes'?'#E4CC7E':'#7C786E' };\n\n    const nav = {\n      back:this.back, home:()=>this.go('home'), requests:()=>this.go('requests'),\n      vehicles:()=>this.go('vehicles'), chats:()=>this.go('chat'), profile:()=>this.go('profile'),\n      custReg:()=>this.go('custReg'), shopReg:()=>this.go('shopReg'), shopPending:()=>this.go('shopPending'),\n      newRequest:()=>this.go('newRequest'), addVehicle:()=>this.go('addVehicle'),\n      shopSelect:()=>this.go('shopSelect'), requestDetail:()=>this.go('requestDetail'),\n      quote:()=>this.go('quote'), chat:()=>this.go('chat'), review:()=>this.go('review'),\n      complaint:()=>this.go('complaint'), complaintDone:()=>this.go('complaintDone'), profile2:()=>this.go('profile'),\n      shopDash:()=>this.go('shopDash'), shopRequests:()=>this.go('shopRequests'),\n      shopRequestDetail:()=>this.go('shopRequestDetail'), sendQuote:()=>this.go('sendQuote'),\n      shopProfileSelf:()=>this.go('shop'),\n      adminDash:()=>this.go('adminDash'), adminPending:()=>this.go('adminPending'), adminDisputes:()=>this.go('adminDisputes'),\n    };\n\n    const menu = [\n      { title:'العميل', items:[\n        { label:'اختيار نوع الحساب', go:()=>this.jump('onboarding') },\n        { label:'تسجيل عميل', go:()=>this.jump('custReg') },\n        { label:'الرئيسية واكتشاف المتاجر', go:()=>this.jump('home') },\n        { label:'صفحة المتجر', go:()=>this.jump('shop') },\n        { label:'سياراتي', go:()=>this.jump('vehicles') },\n        { label:'إضافة مركبة', go:()=>this.jump('addVehicle') },\n        { label:'طلب خدمة جديد', go:()=>this.jump('newRequest') },\n        { label:'اختيار المتاجر', go:()=>this.jump('shopSelect') },\n        { label:'طلباتي', go:()=>this.jump('requests') },\n        { label:'تتبّع الطلب', go:()=>this.jump('requestDetail') },\n        { label:'عرض السعر', go:()=>this.jump('quote') },\n        { label:'المحادثة', go:()=>this.jump('chat') },\n        { label:'تقييم الخدمة', go:()=>this.jump('review') },\n        { label:'فتح شكوى', go:()=>this.jump('complaint') },\n        { label:'الملف الشخصي', go:()=>this.jump('profile') },\n      ]},\n      { title:'المتجر', items:[\n        { label:'تسجيل متجر', go:()=>this.jump('shopReg') },\n        { label:'قيد المراجعة', go:()=>this.jump('shopPending') },\n        { label:'لوحة تحكم المتجر', go:()=>this.jump('shopDash') },\n        { label:'طلبات واردة', go:()=>this.jump('shopRequests') },\n        { label:'تفاصيل الطلب', go:()=>this.jump('shopRequestDetail') },\n        { label:'إرسال عرض سعر', go:()=>this.jump('sendQuote') },\n      ]},\n      { title:'الإدارة', items:[\n        { label:'لوحة تحكم الإدارة', go:()=>this.jump('adminDash') },\n        { label:'اعتماد المتاجر', go:()=>this.jump('adminPending') },\n        { label:'إدارة النزاعات', go:()=>this.jump('adminDisputes') },\n      ]},\n    ];\n\n    const shops = [\n      { id:'sh1', name:'لمسات الفخامة', mono:'ل', area:'العليا، الرياض', rating:'4.9', reviews:218, jobs:312, dist:'2.4 كم', tags:['تظليل','حماية PPF','تلميع'], verified:true, price:'يبدأ من 450 ر.س', open:()=>this.go('shop') },\n      { id:'sh5', name:'ماسة كار', mono:'م', area:'الملقا، الرياض', rating:'4.9', reviews:301, jobs:410, dist:'1.8 كم', tags:['تلميع نانو','تنظيف','إضاءة'], verified:true, price:'يبدأ من 380 ر.س', open:()=>this.go('shop') },\n      { id:'sh2', name:'بريق الخليج', mono:'ب', area:'النخيل، الرياض', rating:'4.8', reviews:176, jobs:256, dist:'3.1 كم', tags:['تظليل','صوتيات'], verified:true, price:'يبدأ من 320 ر.س', open:()=>this.go('shop') },\n      { id:'sh3', name:'النخبة لكماليات السيارات', mono:'ن', area:'الملقا، الرياض', rating:'4.7', reviews:132, jobs:198, dist:'4.6 كم', tags:['جلود','إضاءة'], verified:true, price:'يبدأ من 500 ر.س', open:()=>this.go('shop') },\n      { id:'sh4', name:'درع الحماية', mono:'د', area:'قرطبة، الرياض', rating:'4.6', reviews:98, jobs:142, dist:'5.2 كم', tags:['أفلام حماية','تلميع'], verified:true, price:'يبدأ من 600 ر.س', open:()=>this.go('shop') },\n    ].map(s => { const sel = this.state.selectedShops.includes(s.id); return { ...s, selected:sel, selBorder: sel?'#A07E2E':'#ECE8DF', selBg: sel?'#A07E2E':'#fff', toggle:()=>this.toggleShop(s.id) }; });\n    const selectedCount = this.state.selectedShops.length;\n\n    const vehicles = [\n      { id:'v1', name:'تويوتا لاند كروزر', year:'2023', color:'أبيض لؤلؤي', plate:'ر ب ح ٤٨٢١', mono:'LC', main:true },\n      { id:'v2', name:'لكزس LX 600', year:'2024', color:'أسود', plate:'أ د ل ٩٠٣٢', mono:'LX' },\n      { id:'v3', name:'مرسيدس G-Class', year:'2022', color:'رمادي معدني', plate:'—', mono:'G' },\n    ];\n\n    const stColors = {\n      pending:  { c:'#B98F2E', b:'#F6EFDD' },\n      offers:   { c:'#A07E2E', b:'#F6EFDD' },\n      inprogress:{ c:'#B98F2E', b:'#F6EFDD' },\n      completed:{ c:'#2E7D
